name: BdC Metrics (reusable)

on:
  workflow_call:
    inputs:
      vault_path:
        description: "Ruta a la carpeta okf/ dentro del repo que llama"
        required: true
        type: string
      commit_back:
        description: "Si true, commitea reports/report.json en el repo que llama"
        required: false
        type: boolean
        default: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo que llama (contenido BdC)
        uses: actions/checkout@v4
        with:
          path: bdc-content

      - name: Checkout bdc-metrics (scripts)
        uses: actions/checkout@v4
        with:
          repository: ceprud/bdc-metrics
          path: bdc-metrics

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r bdc-metrics/requirements.txt

      - name: Ejecutar métricas
        run: |
          python bdc-metrics/src/report.py \
            --repo bdc-content \
            --vault bdc-content/${{ inputs.vault_path }} \
            --out bdc-content/reports/report.json

      - name: Subir informe como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: bdc-metrics-report
          path: bdc-content/reports/report.json

      - name: Commit del informe al repo de contenido
        if: ${{ inputs.commit_back }}
        working-directory: bdc-content
        run: |
          git config user.name "bdc-metrics-bot"
          git config user.email "bdc-metrics-bot@users.noreply.github.com"
          git add reports/report.json
          git diff --cached --quiet || git commit -m "chore: actualizar métricas BdC [skip ci]"
          git push
